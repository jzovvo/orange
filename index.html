  <style>
    * {
      margin: 0;
      padding: 0;
    }
    body {
      background-color: black;
      overflow-x: hidden;
    }
    img {
      width: 100%;
      display: block;
    }

    .wrapper {
      position: relative;
    }

    .web {
      position: absolute;
      top: calc(100% / 2304 * 913);
      width: calc(100% / 4096 * 1599);
    }

    .web::after {
      content: '';
      display: block;
      padding-top: calc(100% / 1599 * 1205);
      background-color: red;
    }

    .web iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .web1 {
      left: calc(100% / 4096 * 254);
    }

    .web2 {
      left: calc(100% / 4096 * 2244);
    }
    .main1 {
      position: relative;
      pointer-events: none;
    }
  </style>
  <div class="wrapper">
    <div class="web web1">

    </div>
    <div class="web web2">

</body>
